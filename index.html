<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Setter Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a0f;--surface:#0a0f16;--surface2:#040d14;
  --border:#0d1a24;--border2:#1a2a35;
  --text:#e8f4ff;--muted:#2a4a5a;--muted2:#7090a8;
  --cyan:#00d4ff;--cyan2:#00aaff;--cyan-glow:rgba(0,212,255,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  background:var(--bg);color:var(--text);
  font-family:'Space Mono',monospace;min-height:100vh;
  background-image:linear-gradient(rgba(0,170,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,170,255,0.022) 1px,transparent 1px);
  background-size:30px 30px;
}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border2);background:#040810;position:sticky;top:0;z-index:100;}
.tab{display:flex;flex-direction:column;align-items:center;gap:5px;padding:13px 0;flex:1;border-bottom:2px solid transparent;cursor:pointer;transition:all 0.2s;user-select:none;position:relative;}
.tab::after{content:'';position:absolute;bottom:-1px;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:0;transition:opacity 0.3s;}
.tab.active::after{opacity:1;}
.tab .ticon{width:22px;height:22px;flex-shrink:0;transition:filter 0.3s;}
.tab.active .ticon{filter:drop-shadow(0 0 5px rgba(0,212,255,0.8));}
.tab .tlbl{font-size:9px;letter-spacing:2px;color:var(--muted2);transition:color 0.2s;}
.tab.active .tlbl{color:var(--cyan);}
.tab:hover:not(.active) .tlbl{color:var(--text);}
.live-indicator{display:flex;align-items:center;gap:6px;padding:0 16px;border-left:1px solid var(--border2);}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--cyan);}
.live-lbl{font-size:8px;color:rgba(0,212,255,0.4);letter-spacing:1px;}

/* PAGES */
.page{display:none;}
.page.active{display:block;}

/* ===== DASHBOARD ===== */
.dash-page{padding:20px;}
.dash-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.dash-logo{display:flex;align-items:center;gap:14px;}
.dash-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:4px;line-height:1;}
.dash-title .s{background:linear-gradient(180deg,#e8f4ff,#a0b8cc,#6080a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.dash-title .t{color:var(--cyan);text-shadow:0 0 10px rgba(0,212,255,0.5);}
.dash-sub{font-size:7px;color:rgba(0,170,255,0.3);letter-spacing:2px;margin-top:2px;}
.dash-clock{text-align:right;}
.dash-time{font-size:9px;color:rgba(0,170,255,0.5);}
.dash-date-lbl{font-size:7px;color:rgba(0,170,255,0.25);margin-top:2px;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr) 1.2fr;gap:10px;margin-bottom:12px;}
.kpi-card{background:linear-gradient(135deg,#060e16,#08121c);border-radius:10px;padding:14px;position:relative;overflow:hidden;border:1px solid rgba(0,170,255,0.1);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--kc,var(--cyan)),transparent);}
.kpi-label{font-size:8px;color:rgba(0,170,255,0.45);letter-spacing:2px;margin-bottom:5px;}
.kpi-val{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;line-height:1;color:var(--kc,var(--cyan));}
.kpi-sub{font-size:8px;color:rgba(0,170,255,0.3);margin-top:3px;}
.kpi-spark{width:100%;margin-top:6px;opacity:0.45;}

/* RING KPI CARD */
.kpi-ring-card{background:linear-gradient(135deg,#030a06,#050d08);border-radius:10px;padding:12px 12px 8px;position:relative;overflow:hidden;border:1px solid rgba(0,212,255,0.2);display:flex;flex-direction:column;align-items:center;}
.kpi-ring-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.kpi-ring-lbl{font-size:8px;color:rgba(0,212,255,0.4);letter-spacing:2px;margin-bottom:8px;}
.ring-container{position:relative;display:flex;align-items:center;justify-content:center;}
.ring-text-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;width:100%;}
.ring-pct{font-family:'Bebas Neue',sans-serif;font-size:18px;line-height:1;text-shadow:0 0 10px rgba(0,212,255,0.9);}
.ring-cnt{font-size:7px;color:rgba(0,212,255,0.4);margin-top:1px;}

/* MID ROW */
.mid-row{display:grid;grid-template-columns:3fr 2fr;gap:10px;margin-bottom:12px;}
.graph-card{background:linear-gradient(135deg,#060e16,#08121c);border:1px solid rgba(0,170,255,0.1);border-radius:10px;padding:14px;position:relative;overflow:hidden;min-height:180px;display:flex;flex-direction:column;}
.graph-card::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--cyan2),transparent);}
.graph-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.graph-title{font-size:8px;color:rgba(0,170,255,0.4);letter-spacing:2px;}
.graph-legend{display:flex;gap:10px;}
.graph-legend span{font-size:8px;}
.graph-canvas-wrap{flex:1;position:relative;min-height:160px;}
.graph-canvas-wrap canvas{display:block;width:100%;height:100%;min-height:160px;}
.funnel-card{background:linear-gradient(135deg,#060e16,#08121c);border:1px solid rgba(0,170,255,0.1);border-radius:10px;padding:14px;position:relative;overflow:hidden;}
.funnel-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.funnel-title{font-size:8px;color:rgba(0,170,255,0.4);letter-spacing:2px;margin-bottom:12px;}
.funnel-row{margin-bottom:7px;}
.funnel-row-head{display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px;}
.funnel-row-lbl{color:rgba(0,170,255,0.5);}
.funnel-row-pct{font-weight:700;}
.funnel-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.funnel-bar-fill{height:100%;border-radius:2px;}
.funnel-ents{padding-top:8px;border-top:1px solid var(--border);margin-top:6px;}
.funnel-ent-row{display:flex;justify-content:space-between;font-size:9px;margin-bottom:3px;}

/* ENT CARDS */
.ents-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px;}
.dash-ent-card{background:linear-gradient(135deg,#060e16,#08121c);border:1px solid rgba(var(--cr),0.12);border-radius:10px;padding:12px;position:relative;overflow:hidden;}
.dash-ent-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--c),transparent);}
.dash-ent-name{font-family:'Bebas Neue',sans-serif;color:var(--c);font-size:0.9rem;letter-spacing:2px;margin-bottom:8px;padding-left:10px;}
.dash-ent-body{padding-left:10px;}
.dash-ent-row{display:flex;justify-content:space-between;font-size:10px;padding:3px 0;border-bottom:1px solid var(--border);}
.dash-ent-row:last-child{border-bottom:none;}
.dash-ent-lbl{color:rgba(0,170,255,0.4);}
.dash-ent-val{color:var(--text);}
.dash-ent-call{color:var(--c);font-weight:700;}
.dash-ent-bar{height:2px;background:var(--border);border-radius:1px;margin-top:6px;overflow:hidden;}
.dash-ent-bar-fill{height:100%;border-radius:1px;}
.dash-ent-conv{font-size:8px;color:rgba(var(--cr),0.5);text-align:right;margin-top:2px;}

/* BOTTOM ROW */
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rev-card-dash{background:linear-gradient(135deg,#060e16,#08121c);border:1px solid rgba(52,211,153,0.15);border-radius:10px;padding:14px;position:relative;overflow:hidden;}
.rev-card-dash::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#34d399,transparent);}
.rev-title{font-size:8px;color:rgba(52,211,153,0.5);letter-spacing:2px;margin-bottom:10px;}
.rev-ent-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px;}
.obj-card-dash{background:linear-gradient(135deg,#060e16,#08121c);border:1px solid rgba(0,170,255,0.1);border-radius:10px;padding:14px;position:relative;overflow:hidden;}
.obj-card-dash::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan2),transparent);}
.obj-title{font-size:8px;color:rgba(0,170,255,0.4);letter-spacing:2px;margin-bottom:10px;}
.obj-row{margin-bottom:8px;}
.obj-row-head{display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px;}
.obj-bar{height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.obj-bar-fill{height:100%;border-radius:1px;}

/* ===== JOURNALIER ===== */
.jour-page{padding:20px;}
.jh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.jh-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:4px;}
.jh-right{display:flex;align-items:center;gap:14px;}
.jh-total{font-size:13px;color:var(--muted2);}
.jh-total span{color:var(--cyan);font-family:'Bebas Neue',sans-serif;font-size:1.4rem;}
.jh-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--cyan);padding:9px 16px;border-radius:8px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;transition:all 0.2s;}
.jh-btn:hover{border-color:var(--cyan);box-shadow:0 0 8px var(--cyan-glow);}

/* CALENDAR */
.cal-wrap{background:linear-gradient(135deg,#060e16,#08121c);border:1px solid var(--border2);border-radius:12px;padding:18px;margin-bottom:18px;position:relative;overflow:hidden;}
.cal-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan2),transparent);}
.cal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.cal-label{font-size:11px;color:var(--cyan2);opacity:0.4;letter-spacing:2px;}
.cal-nav{display:flex;gap:8px;}
.cal-nav-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.cal-nav-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:8px;}
.cal-dh{text-align:center;font-size:11px;color:var(--muted2);padding:6px 0;border-bottom:1px solid var(--border);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-cell{min-height:44px;border-radius:8px;cursor:pointer;border:1px solid transparent;color:var(--muted);transition:all 0.15s;background:rgba(255,255,255,0.01);display:flex;flex-direction:column;align-items:center;padding:6px 4px;gap:3px;}
.cal-cell:hover{background:rgba(0,170,255,0.05);border-color:rgba(0,170,255,0.15);}
.cal-cell.worked{color:var(--text);background:rgba(0,170,255,0.04);border-color:rgba(0,170,255,0.08);}
.cal-cell.today{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.35);color:var(--cyan);}
.cal-cell.selected:not(.today){border-color:rgba(0,170,255,0.4);background:rgba(0,170,255,0.06);}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
.cal-cell-num{font-size:12px;font-weight:400;line-height:1;}
.cal-cell.today .cal-cell-num{font-weight:700;}
.cal-cell-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;}
.cal-dot{width:5px;height:5px;border-radius:50%;}
.cal-cell-total{font-size:9px;color:var(--muted2);margin-top:auto;}
.cal-cell.worked .cal-cell-total{color:var(--cyan2);opacity:0.6;}

/* 4 ENT METRIC CARDS */
.ent-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.ent-card{background:var(--surface);border-radius:12px;overflow:hidden;border-top:3px solid var(--c);}
.ent-card-head{padding:16px 20px 12px;background:linear-gradient(180deg,rgba(var(--cr),0.05),transparent);}
.ent-card-head-inner{display:flex;justify-content:space-between;align-items:center;}
.ent-card-name{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;color:var(--c);}
.ent-card-total{font-size:11px;color:var(--c);background:var(--surface2);border:1px solid rgba(var(--cr),0.2);padding:4px 10px;border-radius:4px;}
.ent-card-body{padding:4px 20px 18px;}

/* METRIC ROWS — parfaitement droites */
.mrow{display:flex;align-items:center;height:56px;border-bottom:1px solid var(--border);white-space:nowrap;}
.mrow:last-child{border-bottom:none;}
.mrow.sep{border-top:1px solid rgba(var(--cr),0.2);margin-top:6px;border-bottom:none;}
.mlbl{flex:1;font-size:13px;color:var(--muted2);white-space:nowrap;overflow:hidden;}
.mlbl.call{color:var(--c);font-weight:700;}

/* PREMIUM BUTTONS */
.mbtn-wrap{display:flex;align-items:center;gap:0;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;overflow:hidden;flex-shrink:0;margin-left:12px;}
.mminus{width:38px;height:38px;border:none;background:transparent;color:var(--muted2);cursor:pointer;font-size:20px;font-weight:300;display:flex;align-items:center;justify-content:center;touch-action:manipulation;transition:all 0.15s;padding:0;line-height:1;border-right:1px solid var(--border2);}
.mminus:hover{background:rgba(255,255,255,0.05);color:var(--text);}
.mminus:active{transform:scale(0.9);}
.mval-input{width:46px;text-align:center;background:transparent;border:none;color:var(--text);font-family:'Space Mono',monospace;font-size:15px;outline:none;padding:0;cursor:text;}
.mval-input.call-val{color:var(--c);}
.mval-input::-webkit-inner-spin-button,.mval-input::-webkit-outer-spin-button{-webkit-appearance:none;}
.mplus{width:38px;height:38px;border:none;background:var(--c);color:#000;cursor:pointer;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;touch-action:manipulation;transition:all 0.15s;padding:0;line-height:1;border-left:1px solid var(--border2);}
.mplus:hover{opacity:0.85;}
.mplus:active{transform:scale(0.9);}

/* TOTAL CALLS */
.tcrow{display:flex;justify-content:space-between;align-items:center;padding:12px 0 0;border-top:1px solid rgba(var(--cr),0.25);margin-top:6px;}
.tclbl{font-size:14px;color:var(--cyan);font-weight:700;}
.tcval{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--cyan);}

/* DAILY TASKS DASH */
.kpi-tasks-card{background:linear-gradient(135deg,#030a06,#050d08);border-radius:10px;padding:12px;position:relative;overflow:hidden;border:1px solid rgba(0,212,255,0.25);}
.kpi-tasks-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.kpi-tasks-bg{position:absolute;inset:0;opacity:0.03;pointer-events:none;background-image:linear-gradient(#00d4ff 1px,transparent 1px),linear-gradient(90deg,#00d4ff 1px,transparent 1px);background-size:18px 18px;}
.kpi-tasks-lbl{font-size:8px;color:rgba(0,212,255,0.4);letter-spacing:2px;margin-bottom:8px;position:relative;}

/* DAILY TASKS JOUR */
.tasks-wrap{position:relative;border-radius:12px;padding:18px;overflow:hidden;background:#030a06;border:1px solid rgba(0,212,255,0.15);}
.tasks-wrap::before{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.tasks-bg-grid{position:absolute;inset:0;opacity:0.025;pointer-events:none;background-image:linear-gradient(#00d4ff 1px,transparent 1px),linear-gradient(90deg,#00d4ff 1px,transparent 1px);background-size:22px 22px;}
.tasks-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;position:relative;}
.tasks-sub{font-size:9px;color:rgba(0,212,255,0.3);letter-spacing:3px;margin-bottom:3px;}
.tasks-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:3px;}
.tasks-title span{color:var(--cyan);}
.tasks-list{display:grid;grid-template-columns:1fr 1fr;gap:6px;position:relative;}
.task-item{display:flex;align-items:center;gap:10px;background:#020706;border:1px solid #081208;border-radius:8px;padding:12px 12px 12px 15px;cursor:pointer;user-select:none;position:relative;overflow:hidden;transition:border-color 0.15s;}
.task-item:hover{border-color:rgba(0,212,255,0.1);}
.task-item.done{background:#010503;border-color:#060e07;}
.task-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.task-cb{width:16px;height:16px;border-radius:4px;border:1px solid #0a2010;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.task-cb.checked{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 5px rgba(0,212,255,0.4);}
.task-lbl{flex:1;font-size:13px;color:#c8e8f0;transition:all 0.2s;}
.task-item.done .task-lbl{text-decoration:line-through;text-decoration-color:rgba(0,212,255,0.2);color:#1a3a44;}
.task-badge{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid;flex-shrink:0;font-weight:700;}
.task-item.done .task-badge{opacity:0.2;}
.tasks-footer{margin-top:12px;padding-top:8px;border-top:1px solid rgba(0,212,255,0.06);display:flex;justify-content:space-between;position:relative;}
.tasks-reset{font-size:9px;color:rgba(0,212,255,0.15);}
.tasks-status{font-size:9px;color:rgba(0,212,255,0.35);}
.scan-line{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.15),transparent);pointer-events:none;}

/* LEADS */
.leads-page{padding:20px;}
.leads-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:12px;}
.ladd-btn{color:#000;border:none;border-radius:8px;padding:9px 14px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
.ladd-btn:hover{opacity:0.85;}
.leads-table{width:100%;border-collapse:collapse;font-size:13px;}
.leads-table th{text-align:left;padding:10px;border-bottom:1px solid var(--border2);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);}
.leads-table td{padding:10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.leads-table tr:hover td{background:var(--surface);}
.linput{background:transparent;border:none;color:var(--text);font-family:'Space Mono',monospace;font-size:13px;outline:none;width:100%;min-width:80px;}
.linput:focus{background:var(--surface);border-radius:4px;padding:2px 4px;}
.lcash{font-family:'Space Mono',monospace;font-size:12px;width:70px;background:transparent;border:none;color:var(--text);outline:none;}
.lcash:focus{background:var(--surface);border-radius:4px;padding:2px 4px;}
.lcomm{color:var(--cyan);font-family:'Space Mono',monospace;font-size:12px;}
.ltag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;background:var(--surface);border:1px solid var(--border2);color:var(--muted2);margin:1px;}
.ltag-x{cursor:pointer;color:var(--muted2);transition:color 0.2s;}
.ltag-x:hover{color:#f43f5e;}
.ldel{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:6px;transition:color 0.2s;}
.ldel:hover{color:#f43f5e;}
.leads-sum{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:16px;}
.lsum-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;border-left:3px solid var(--c);}
.lsum-name{font-size:10px;color:var(--c);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;}
.lsum-val{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;}
.lsum-comm{font-size:10px;color:var(--cyan);margin-top:2px;}

/* PARAMS */
.params-page{padding:20px;}
.params-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.params-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;border-top:3px solid var(--c);}
.pfield{margin-bottom:12px;}
.plabel{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin-bottom:5px;}

.pinput:focus{border-color:var(--c,var(--cyan));}
.psave{width:100%;background:var(--c);color:#000;border:none;border-radius:8px;padding:10px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;margin-top:4px;transition:opacity 0.2s;}

.pdel{width:100%;background:transparent;color:#f43f5e;border:1px solid rgba(244,63,94,0.3);border-radius:8px;padding:8px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;margin-top:4px;transition:all 0.2s;}
.pdel:hover{background:rgba(244,63,94,0.08);}
.padd{background:var(--surface2);border:1px dashed var(--border2);border-radius:12px;padding:24px;text-align:center;cursor:pointer;color:var(--muted2);font-size:13px;transition:all 0.2s;}
.padd:hover{border-color:var(--cyan);color:var(--cyan);}
.task-config{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:20px;}
.task-config-title{font-size:10px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}
.task-config-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.task-config-item{display:flex;align-items:center;gap:10px;background:var(--surface2);border-radius:8px;padding:10px 14px;border:1px solid var(--border);}
.task-config-lbl{flex:1;font-size:13px;}
.task-config-badge{font-size:10px;color:var(--muted2);background:var(--border2);padding:2px 8px;border-radius:4px;}
.task-config-del{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;transition:color 0.2s;padding:4px;}
.task-config-del:hover{color:#f43f5e;}
.task-add-row{display:flex;gap:8px;}
.task-add-input{flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Space Mono',monospace;font-size:13px;outline:none;}
.task-add-input:focus{border-color:var(--cyan);}
.task-add-btn{background:var(--cyan);color:#000;border:none;border-radius:8px;padding:8px 16px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
.task-add-btn:hover{opacity:0.85;}

.stitle{font-size:10px;color:var(--muted2);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;}

/* ===== FUNNEL FILTERS ===== */
.funnel-filters{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px;}
.funnel-filters::-webkit-scrollbar{display:none;}
.funnel-filter-btn{background:transparent;border:1px solid var(--border2);color:var(--muted2);border-radius:6px;padding:3px 9px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:0.5px;cursor:pointer;white-space:nowrap;transition:all 0.15s;flex-shrink:0;}
.funnel-filter-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.funnel-filter-btn.active{font-weight:700;}

/* ===== ACCORDÉONS PARAMS ===== */
.acc-wrap{margin-bottom:8px;}
.acc-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;padding:14px 16px;border-radius:10px;background:var(--surface);border:1px solid var(--border);transition:border-color 0.2s;}
.acc-header:hover{border-color:var(--border2);}
.acc-header.open{border-color:rgba(0,212,255,0.2);border-radius:10px 10px 0 0;}
.acc-chevron{font-size:10px;color:var(--muted2);transition:transform 0.25s;flex-shrink:0;}
.acc-header.open .acc-chevron{transform:rotate(180deg);}
.acc-body{background:var(--surface);border:1px solid rgba(0,212,255,0.12);border-top:none;border-radius:0 0 10px 10px;padding:16px;display:none;}
.acc-body.open{display:block;}

/* ===== RESPONSIVE MOBILE ===== */
@media (max-width: 768px) {

  /* --- Tab bar --- */
  .tab { padding: 10px 0; gap: 3px; }
  .tab .ticon { width: 20px; height: 20px; }
  .tab .tlbl { font-size: 8px; letter-spacing: 1px; }
  .live-lbl { display: none; }
  #authChip { display: none !important; }

  /* --- Pages padding --- */
  .dash-page, .jour-page, .leads-page, .params-page { padding: 12px; }

  /* --- Dashboard header --- */
  .dash-header { margin-bottom: 14px; }
  .dash-title { font-size: 1.2rem; }
  .dash-sub { display: none; }
  .dash-clock { display: none; }

  /* === KPI row : 2 colonnes, ring card pleine largeur === */
  .kpi-row {
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .kpi-tasks-card {
    grid-column: 1 / -1;
  }
  .kpi-val { font-size: 1.4rem; }
  .kpi-label { font-size: 8px; }

  /* === Mid row : 1 colonne empilée === */
  .mid-row {
    display: flex !important;
    flex-direction: column !important;
    gap: 8px;
    width: 100%;
  }
  .mid-row > * {
    width: 100% !important;
    box-sizing: border-box;
  }

  /* === Graph card === */
  .graph-card {
    height: auto !important;
    min-height: unset;
    display: flex;
    flex-direction: column;
  }
  /* Header du graph : empiler titre et légende verticalement */
  .graph-head {
    flex-direction: column !important;
    align-items: flex-start !important;
    gap: 6px;
  }
  .graph-legend {
    flex-wrap: wrap !important;
  }
  /* Canvas wrapper : hauteur fixe explicite */
  .graph-canvas-wrap {
    height: 200px !important;
    min-height: 200px !important;
    flex: none !important;
    width: 100% !important;
    display: block !important;
    position: relative !important;
  }
  #convChart {
    display: block !important;
    width: 100% !important;
    height: 200px !important;
    position: relative !important;
  }

  /* === Funnel card : hauteur auto selon contenu === */
  .funnel-card {
    height: auto !important;
    overflow: visible !important;
  }

  /* === Ent cards Dashboard : 1 colonne === */
  .ents-row {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  /* === Bottom row : 1 colonne === */
  .bottom-row {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  /* --- Revenue inline grids (override) --- */
  .rev-card-dash [style*="grid-template-columns:repeat(4"],
  .rev-card-dash [style*="grid-template-columns: repeat(4"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }

  /* --- JOUR header --- */
  .jh { flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 14px; }
  .jh-title { font-size: 1.4rem; }
  .jh-right { width: 100%; justify-content: space-between; }

  /* === Calendar : réduire cellules === */
  .cal-wrap { padding: 12px; }
  .cal-cell { min-height: 36px; padding: 4px 2px; }
  .cal-cell-num { font-size: 11px; }
  .cal-cell-total { display: none; }
  .cal-dh { font-size: 10px; }

  /* === Ent metric cards : 1 colonne === */
  .ent-grid {
    grid-template-columns: 1fr;
    gap: 10px;
  }

  /* Boutons +/- : zone tactile confortable au pouce */
  .mminus, .mplus { width: 44px; height: 44px; font-size: 22px; }
  .mval-input { width: 52px; font-size: 16px; }
  .mlbl { font-size: 12px; }
  .mrow { height: 52px; }

  /* === Tasks list : 1 colonne === */
  .tasks-list { grid-template-columns: 1fr; }
  .tasks-wrap { padding: 14px; }
  .task-lbl { font-size: 12px; }

  /* === LEADS === */
  .leads-table { font-size: 12px; }
  .leads-table th { font-size: 9px; padding: 8px 6px; }
  .leads-table td { padding: 8px 6px; }

  /* Summary leads + revenus manuels : 2 colonnes */
  .leads-sum {
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  #revManuelsGrid {
    grid-template-columns: repeat(2, 1fr) !important;
  }

  /* === PARAMS : 1 colonne === */
  .params-grid {
    grid-template-columns: 1fr;
    gap: 10px;
  }
}

@media (max-width: 480px) {

  /* Tab bar encore plus compact */
  .tab { padding: 8px 0; gap: 2px; }
  .tab .ticon { width: 18px; height: 18px; }
  .tab .tlbl { font-size: 7px; }

  /* Pages */
  .dash-page, .jour-page, .leads-page, .params-page { padding: 8px; }

  /* KPI cards */
  .kpi-card { padding: 10px; }
  .kpi-val { font-size: 1.2rem; }
  .kpi-spark { display: none; }

  /* Ent cards Dash : toujours 1 colonne */
  .ents-row { grid-template-columns: 1fr; }

  /* Funnel masqué sur très petit écran */
  .funnel-card { display: none; }

  /* Calendar encore plus compact */
  .cal-cell { min-height: 30px; padding: 3px 1px; }
  .cal-cell-num { font-size: 10px; }
  .cal-dot { width: 4px; height: 4px; }

  /* Tasks */
  .task-lbl { font-size: 11px; }
  .task-badge { font-size: 9px; padding: 2px 5px; }

  /* Leads */
  .leads-table { font-size: 11px; }
  .leads-sum { grid-template-columns: 1fr; }
  #revManuelsGrid { grid-template-columns: 1fr !important; }

  /* Auth card */
  .auth-card { padding: 32px 20px; }
  .auth-logo { font-size: 1.5rem; }
  .auth-btn { font-size: 11px; padding: 12px 18px; }
}

// Metric order per ent (drag & drop)
let METRIC_ORDER = {};
function getMetricsOrdered(key){
  const base=[...UNIFIED_METRICS];// Always start from full universal list
  let order=METRIC_ORDER[key];
  // Firebase may return {0:'firstmsg',1:'replies'} instead of array
  if(order&&typeof order==='object'&&!Array.isArray(order)){
    order=Object.values(order).filter(v=>typeof v==='string');
  }
  if(!order||!Array.isArray(order)||order.length===0)return base;
  // Reorder base according to saved order
  const ordered=order.map(k=>base.find(m=>m.k===k)).filter(Boolean);
  // Add any new metrics not yet in saved order
  base.forEach(m=>{if(!ordered.find(o=>o.k===m.k))ordered.push(m);});
  return ordered;
}
async function saveMetricOrder(key,order){
  METRIC_ORDER[key]=order;
  try{await set(ref(db,`config/metricOrder/${key}`),order);}catch(e){}
}
async function loadMetricOrders(){
  try{
    const s=await get(ref(db,'config/metricOrder'));
    if(s.exists()){
      const data=s.val()||{};
      // Firebase stores arrays as objects {0:'a',1:'b'} - convert back to arrays
      Object.keys(data).forEach(ek=>{
        const val=data[ek];
        if(val&&typeof val==='object'&&!Array.isArray(val)){
          METRIC_ORDER[ek]=Object.values(val);
        } else if(Array.isArray(val)){
          METRIC_ORDER[ek]=val;
        }
      });
    }
  }catch(e){}
}

function drawRingFrame(canvasId, progress, size){
  const c=document.getElementById(canvasId);if(!c)return false;
  const ctx=c.getContext('2d');
  const cx=size/2,cy=size/2,r=size*0.32;
  ctx.clearRect(0,0,size,size);
  // Track
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#0a2030';ctx.lineWidth=size*0.09;ctx.stroke();
  // Progress glow
  ctx.save();ctx.shadowColor='#00d4ff';ctx.shadowBlur=10;
  const sa=-Math.PI/2,ea=sa+progress*Math.PI*2;
  ctx.beginPath();ctx.arc(cx,cy,r,sa,ea);
  ctx.strokeStyle=progress>=1?'#00ff88':'#00d4ff';ctx.lineWidth=size*0.09;ctx.lineCap='round';ctx.stroke();
  ctx.restore();
  // Tip dot
  if(progress>0.01){
    const a=ea;
    ctx.save();ctx.shadowColor='#00d4ff';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,size*0.05,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();ctx.restore();
  }
  // Orbits
  orbits.forEach(o=>{
    o.off+=o.speed;
    const or=o.r*size;
    ctx.save();ctx.globalAlpha=o.op;ctx.shadowColor=o.color;ctx.shadowBlur=5;
    ctx.beginPath();ctx.arc(cx,cy,or,o.off,o.off+o.len*Math.PI*2);
    ctx.strokeStyle=o.color;ctx.lineWidth=o.w;ctx.stroke();
    const px=cx+Math.cos(o.off+o.len*Math.PI*2)*or;
    const py=cy+Math.sin(o.off+o.len*Math.PI*2)*or;
    ctx.beginPath();ctx.arc(px,py,1.8,0,Math.PI*2);ctx.fillStyle=o.color;ctx.fill();
    ctx.restore();
  });
  return true;
}

let _hexFrame=0;
function drawHexDash(entData){
  window._lastEntData=entData;
  _hexFrame++;
  const canvas=document.getElementById('hexDash');if(!canvas)return;
    const dpr=window.devicePixelRatio||1;
    const W=canvas.offsetWidth||300,H=120;
    if(canvas.width!==W*dpr||canvas.height!==H*dpr){canvas.width=W*dpr;canvas.height=H*dpr;}
    const ctx=canvas.getContext('2d');ctx.save();ctx.scale(dpr,dpr);ctx.clearRect(0,0,W,H);
    const r=Math.min(W/6,H*0.38);
    const positions=[{x:W*0.13,y:H*0.52},{x:W*0.38,y:H*0.52},{x:W*0.63,y:H*0.52},{x:W*0.88,y:H*0.52}];
    function hexPath(cx,cy,r2){
      ctx.beginPath();
      for(let i=0;i<6;i++){const a=Math.PI/6+i*Math.PI/3;i===0?ctx.moveTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2):ctx.lineTo(cx+Math.cos(a)*r2,cy+Math.sin(a)*r2);}
      ctx.closePath();
    }
    entData.forEach((d,i)=>{
      const p=positions[i];
      const pulse=1+Math.sin(_hexFrame*0.04+i*1.2)*0.02;
      const rp=r*pulse;
      // Outer rings
      [1.45,1.22].forEach(s=>{hexPath(p.x,p.y,rp*s);ctx.strokeStyle=d.e.hex+'14';ctx.lineWidth=0.6;ctx.stroke();});
      // Main hex
      hexPath(p.x,p.y,rp);
      const g=ctx.createRadialGradient(p.x,p.y-rp*0.2,0,p.x,p.y,rp);
      g.addColorStop(0,d.e.hex+'30');g.addColorStop(1,d.e.hex+'06');
      ctx.fillStyle=g;ctx.fill();
      ctx.save();ctx.shadowColor=d.e.hex;ctx.shadowBlur=10;ctx.strokeStyle=d.e.hex;ctx.lineWidth=1.2;ctx.stroke();ctx.restore();
      // Arc conversion
      const cv=Math.min(d.conv/100,1);
      if(cv>0){
        ctx.save();ctx.shadowColor=d.e.hex;ctx.shadowBlur=8;
        ctx.beginPath();ctx.arc(p.x,p.y,rp*0.72,-Math.PI/2,-Math.PI/2+cv*Math.PI*2);
        ctx.strokeStyle=d.e.hex;ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();ctx.restore();
        // Tip dot
        const ea=-Math.PI/2+cv*Math.PI*2;
        ctx.save();ctx.shadowColor=d.e.hex;ctx.shadowBlur=6;
        ctx.beginPath();ctx.arc(p.x+Math.cos(ea)*rp*0.72,p.y+Math.sin(ea)*rp*0.72,2,0,Math.PI*2);
        ctx.fillStyle='#fff';ctx.fill();ctx.restore();
      }
      // Labels
      ctx.fillStyle=d.e.hex;ctx.font='bold 8px monospace';ctx.textAlign='center';
      ctx.fillText(d.e.name,p.x,p.y-7);
      ctx.fillStyle='#e8f4ff';ctx.font='bold 11px monospace';
      ctx.fillText(d.conv+'%',p.x,p.y+5);
      ctx.fillStyle=d.e.hex+'88';ctx.font='7px monospace';
      ctx.fillText(d.calls+' calls',p.x,p.y+16);
    });
    ctx.restore();
}

function drawPodium(entData){
  const canvas=document.getElementById('podiumCanvas');
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  const W=rect.width||canvas.offsetWidth||260;
  const H=115;
  if(W<10)return;
  canvas.width=Math.round(W*dpr);
  canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  // Scores basés sur commission réelle
  const scores=entData.map(d=>({
    e:d.e,
    score:d.comm,
    label:d.comm>0?d.comm.toFixed(0)+'€':'—'
  })).sort((a,b)=>b.score-a.score);

  const MEDALS=['#ffd700','#c0c0c0','#cd7f32'];
  const GLOW=['rgba(255,215,0,0.8)','rgba(192,192,192,0.6)','rgba(205,127,50,0.6)'];
  const baseY=H-8;
  const first=scores[0];

  // Couronne géométrique SVG-like
  function drawCrown(cx,cy,size,color,glow){
    ctx.save();ctx.shadowColor=glow;ctx.shadowBlur=14;
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.fillStyle=color+'22';
    const bw=size*0.9,bh=size*0.25;
    // Base
    ctx.beginPath();ctx.moveTo(cx-bw/2,cy+size*0.1);ctx.lineTo(cx+bw/2,cy+size*0.1);ctx.lineTo(cx+bw/2,cy+size*0.35);ctx.lineTo(cx-bw/2,cy+size*0.35);ctx.closePath();ctx.fill();ctx.stroke();
    // 3 pointes
    [[cx-bw/2,cy+size*0.1,cx-bw/2,cy-size*0.28,cx-bw*0.18,cy+size*0.1],
     [cx-bw*0.18,cy+size*0.1,cx,cy-size*0.48,cx+bw*0.18,cy+size*0.1],
     [cx+bw*0.18,cy+size*0.1,cx+bw/2,cy-size*0.28,cx+bw/2,cy+size*0.1]
    ].forEach(p=>{ctx.beginPath();ctx.moveTo(p[0],p[1]);ctx.lineTo(p[2],p[3]);ctx.lineTo(p[4],p[5]);ctx.closePath();ctx.fill();ctx.stroke();});
    // Losanges aux pointes
    [[cx-bw/2,cy-size*0.28,size*0.07],[cx,cy-size*0.48,size*0.1],[cx+bw/2,cy-size*0.28,size*0.07]].forEach(p=>{
      const ds=p[2];ctx.save();ctx.shadowBlur=10;ctx.fillStyle=color;
      ctx.beginPath();ctx.moveTo(p[0],p[1]-ds);ctx.lineTo(p[0]+ds,p[1]);ctx.lineTo(p[0],p[1]+ds);ctx.lineTo(p[0]-ds,p[1]);ctx.closePath();ctx.fill();ctx.restore();
    });
    // Ligne déco pointillée
    ctx.beginPath();ctx.setLineDash([2,3]);ctx.moveTo(cx-bw/2+3,cy+size*0.22);ctx.lineTo(cx+bw/2-3,cy+size*0.22);ctx.stroke();ctx.setLineDash([]);
    ctx.restore();
  }

  // Médaille circulaire
  function drawMedal(cx,cy,rank,color,glow,size){
    ctx.save();ctx.shadowColor=glow;ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(cx,cy,size,0,Math.PI*2);ctx.strokeStyle=color+'55';ctx.lineWidth=0.7;ctx.stroke();
    const gr=ctx.createRadialGradient(cx,cy-size*0.2,0,cx,cy,size);
    gr.addColorStop(0,color+'40');gr.addColorStop(1,color+'08');
    ctx.beginPath();ctx.arc(cx,cy,size*0.8,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();ctx.strokeStyle=color+'88';ctx.lineWidth=1;ctx.stroke();
    const prog=rank===2?0.8:0.55;
    ctx.beginPath();ctx.arc(cx,cy,size*0.8,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);
    ctx.shadowBlur=8;ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.lineCap='round';ctx.stroke();
    ctx.fillStyle=color;ctx.font='bold '+(size*0.9)+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(rank,cx,cy+1);ctx.textBaseline='alphabetic';
    ctx.restore();
  }

  // === 1ER AU CENTRE ===
  const fw=W*0.3, fh=72;
  const fcx=W*0.5, fby=baseY-fh;

  // Halo
  const halo=ctx.createRadialGradient(fcx,baseY,0,fcx,baseY,fw*1.8);
  halo.addColorStop(0,'rgba(255,215,0,0.1)');halo.addColorStop(1,'transparent');
  ctx.fillStyle=halo;ctx.fillRect(fcx-fw*1.5,0,fw*3,H);

  // Bloc 1er
  ctx.save();ctx.shadowColor='rgba(255,215,0,0.7)';ctx.shadowBlur=20;
  const gr1=ctx.createLinearGradient(0,fby,0,fby+fh);
  gr1.addColorStop(0,'rgba(255,215,0,0.35)');gr1.addColorStop(1,'rgba(255,215,0,0.05)');
  ctx.fillStyle=gr1;
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(fcx-fw/2,fby,fw,fh,5);else ctx.rect(fcx-fw/2,fby,fw,fh);
  ctx.fill();ctx.strokeStyle='rgba(255,215,0,0.85)';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();

  // Top line néon
  ctx.save();ctx.shadowColor='#ffd700';ctx.shadowBlur=14;
  ctx.beginPath();ctx.moveTo(fcx-fw/2+3,fby);ctx.lineTo(fcx+fw/2-3,fby);
  ctx.strokeStyle='#ffd700';ctx.lineWidth=2.5;ctx.stroke();ctx.restore();

  // Couronne au-dessus
  drawCrown(fcx,fby-10,14,'#ffd700','rgba(255,215,0,0.9)');

  // Nom + montant 1er
  ctx.save();ctx.shadowColor='#ffd700';ctx.shadowBlur=8;
  ctx.fillStyle='#ffd700';ctx.font='bold 10px monospace';ctx.textAlign='center';
  ctx.fillText(first.e.name,fcx,fby+22);ctx.restore();
  ctx.save();ctx.shadowColor='#ffd700';ctx.shadowBlur=6;
  ctx.fillStyle='rgba(255,215,0,0.95)';ctx.font='bold 13px monospace';ctx.textAlign='center';
  ctx.fillText(first.label,fcx,fby+40);ctx.restore();
  ctx.fillStyle='rgba(255,215,0,0.22)';ctx.font='7px monospace';ctx.textAlign='center';
  ctx.fillText('// 1ER //',fcx,fby+fh-9);

  // === 2E ET 3E ===
  [[1,W*0.17,50],[2,W*0.83,38]].forEach(([si,x,bh])=>{
    if(si>=scores.length)return;
    const s=scores[si];
    const mc=MEDALS[si],glow=GLOW[si];
    const bw=W*0.18,by=baseY-bh;
    // Glow sol
    const gg=ctx.createRadialGradient(x,baseY,0,x,baseY,bw);
    gg.addColorStop(0,mc+'18');gg.addColorStop(1,'transparent');
    ctx.fillStyle=gg;ctx.fillRect(x-bw,baseY-10,bw*2,14);
    // Bloc
    const gr=ctx.createLinearGradient(0,by,0,by+bh);
    gr.addColorStop(0,mc+'28');gr.addColorStop(1,mc+'05');
    ctx.save();ctx.shadowColor=glow;ctx.shadowBlur=10;
    ctx.fillStyle=gr;
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(x-bw/2,by,bw,bh,4);else ctx.rect(x-bw/2,by,bw,bh);
    ctx.fill();ctx.strokeStyle=mc+'44';ctx.lineWidth=0.8;ctx.stroke();ctx.restore();
    // Top line
    ctx.save();ctx.shadowColor=mc;ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(x-bw/2+2,by);ctx.lineTo(x+bw/2-2,by);
    ctx.strokeStyle=mc;ctx.lineWidth=1.2;ctx.stroke();ctx.restore();
    // Médaille
    drawMedal(x,by-14,si+1,mc,glow,10);
    // Nom + montant
    ctx.fillStyle=mc+'cc';ctx.font='bold 8px monospace';ctx.textAlign='center';ctx.fillText(s.e.name,x,by+18);
    ctx.fillStyle=mc+'77';ctx.font='7px monospace';ctx.textAlign='center';ctx.fillText(s.label,x,by+30);
  });

  // Sol lumineux
  ctx.save();ctx.shadowColor='rgba(255,215,0,0.3)';ctx.shadowBlur=6;
  const solG=ctx.createLinearGradient(0,0,W,0);
  solG.addColorStop(0,'transparent');solG.addColorStop(0.3,'rgba(255,215,0,0.25)');
  solG.addColorStop(0.7,'rgba(255,215,0,0.25)');solG.addColorStop(1,'transparent');
  ctx.strokeStyle=solG;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(W*0.05,baseY);ctx.lineTo(W*0.95,baseY);ctx.stroke();
  ctx.restore();
}

async function renderDash(){
  const div=document.getElementById('page_dash');
  const md=await loadMonth(cY,cM);
  const leads=await loadLeads(cY,cM);
  const revenus=await loadRevenus(cY,cM);
  const obj=await loadObjectifs(cY,cM);
  const rev=await loadRevenus(cY,cM);
  const dim=new Date(cY,cM+1,0).getDate();
  const today=now.getDate();

  // Totals
  let todayTotal=0;ENTS.forEach(e=>getMet(e.key).forEach(m=>todayTotal+=gv(md,today,e.key,m.k)));
  let monthCalls=0;for(let d=1;d<=dim;d++)ENTS.forEach(e=>{monthCalls+=getTotalCalls(e.key,md[d]);});

  // Revenus
  let myPart=0;
  ENTS.forEach(e=>{
    const rMan=parseFloat(rev[e.key]?.montant||0);
    // Revenus manuels = directement ce que tu touches (pas de calcul %)
    const rLead=Object.values(leads).filter(l=>l.entKey===e.key).reduce((s,l)=>s+(parseFloat(l.cashReceived)||0)*(e.rate/100),0);
    myPart+=rMan>0?rMan:rLead;
  });

  // Funnel
  const funnelEnts=(window.dashFunnelFilter&&window.dashFunnelFilter!=='all')?ENTS.filter(e=>e.key===window.dashFunnelFilter):ENTS;
  let tfm=0,trep=0,tfu=0,trfu=0,tln=0,tc=0;
  for(let d=1;d<=dim;d++)funnelEnts.forEach(e=>{
    tfm+=gv(md,d,e.key,'firstmsg');trep+=gv(md,d,e.key,'replies');
    tfu+=gv(md,d,e.key,'followup');trfu+=gv(md,d,e.key,'repliesfu');
    tln+=gv(md,d,e.key,'lien');tc+=getTotalCalls(e.key,md[d]);
  });
  const pct=(a,b)=>b>0?Math.round(a/b*100):0;

  // Sparkline — TOUTES les métriques agrégées par jour
  const sparkDays=Math.min(dim,14);
  const sparkRaw=[];
  for(let d=Math.max(1,dim-sparkDays+1);d<=dim;d++){
    let t=0;ENTS.forEach(e=>getMet(e.key).forEach(m=>t+=gv(md,d,e.key,m.k)));
    sparkRaw.push(t);

  const sMax=Math.max(...sparkRaw,1);
  const spark=(data,max,color)=>{
    if(!data||data.length<2)return '';
    const m=Math.max(max||1,1);
    const pts=data.map((v,i)=>`${i/(data.length-1)*60},${12-(v/m)*11}`).join(' ');
    return `<svg viewBox="0 0 60 12" class="kpi-spark"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/></svg>`;
  };
  // callsRaw for calls sparkline
  const callsRaw=[];
  for(let d=Math.max(1,dim-sparkDays+1);d<=dim;d++){let t=0;ENTS.forEach(e=>{t+=getTotalCalls(e.key,md[d]);});callsRaw.push(t);}

  // Graph conversion cumulée par entrepreneur — taux msgs→calls cumulatif jour par jour
  window._convDim=dim;
  window._convData=ENTS.map(e=>{
    let cumFm=0,cumCalls=0;
    const pts=[];
    for(let d=1;d<=dim;d++){
      cumFm+=gv(md,d,e.key,'firstmsg');
      cumCalls+=getTotalCalls(e.key,md[d]);
      pts.push(cumFm>0?Math.round(cumCalls/cumFm*100):null);

    return{e,pts};
  });
  const convData=window._convData;

  // Ents data
  const entData=ENTS.map(e=>{
    let calls=0,fm=0,rep=0,ln=0,fu=0;
    for(let d=1;d<=dim;d++){calls+=getTotalCalls(e.key,md[d]);fm+=gv(md,d,e.key,'firstmsg');rep+=gv(md,d,e.key,'replies');ln+=gv(md,d,e.key,'lien');fu+=gv(md,d,e.key,'followup');}
    const conv=fm>0?Math.round(calls/fm*100):0;
    const oc=obj[e.key]?.call||0;
    const op=oc>0?Math.min(Math.round(calls/oc*100),100):0;
    const rMan=parseFloat(rev[e.key]?.montant||0);
    const rL=Object.values(leads).filter(l=>l.entKey===e.key).reduce((s,l)=>s+(parseFloat(l.cashReceived)||0),0);
    const totR=rMan>0?rMan:rL;
    // comm = revenu manuel direct OU commission calculée sur leads
    const comm=rMan>0?rMan:rL*(e.rate/100);
    return{e,calls,fm,rep,ln,fu,conv,oc,op,totR,comm};
  });
  const totalRev=entData.reduce((s,d)=>s+d.totR,0);

          </div>
          <div style="background:rgba(167,139,250,0.04);border:1px solid rgba(167,139,250,0.1);border-radius:8px;padding:10px 12px;">

        <!-- Détail par entrepreneur -->

  const svg=document.getElementById('chameoSvg');if(svg)drawChameo(svg);
  updateClock();
  // Force canvas dimensions immediately after DOM injection — don't rely on CSS % resolution
  const _cv=document.getElementById('convChart');
  if(_cv){const _pw=_cv.parentElement;const _fw=(_pw&&_pw.offsetWidth)||(_pw&&_pw.parentElement&&_pw.parentElement.offsetWidth)||(window.innerWidth-28);_cv.style.width=_fw+'px';_cv.style.height='200px';}

  // Draw conversion chart on canvas
  // Sparklines once
  setTimeout(()=>{
    const sD=Math.min(dim,14);
    const spk=[];for(let d=Math.max(1,dim-sD+1);d<=dim;d++){let t=0;ENTS.forEach(e=>getMet(e.key).forEach(m=>t+=gv(md,d,e.key,m.k)));spk.push(t);}
    const cspk=[];for(let d=Math.max(1,dim-sD+1);d<=dim;d++){let t=0;ENTS.forEach(e=>{t+=getTotalCalls(e.key,md[d]);});cspk.push(t);}
    drawSparkIron('spark_rev',spk,'#34d399');

    // Podium - setTimeout pour laisser le DOM se stabiliser
    setTimeout(()=>drawPodium(entData),80);
  },50);

  // Start ring animation
  window._lastEntData=entData;
  startRingAnim('dashRing',()=>TASKS.filter(t=>t.done).length/TASKS.length,90);
  setTimeout(()=>{
    drawHexDash(entData);
    if(window._convData&&window._convDim)drawConvChart(window._convData,window._convDim);
    startUnifiedLoop();
  },250);
}

// ===== IRON MAN CHARTS =====
function splinePath(ctx, pts, tension=0.25){
  if(pts.length<2)return;
  ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){
    const p0=pts[Math.max(0,i-2)];
    const p1=pts[i-1];
    const p2=pts[i];
    const p3=pts[Math.min(pts.length-1,i+1)];
    const cp1x=p1.x+(p2.x-p0.x)*tension;
    const cp1y=p1.y+(p2.y-p0.y)*tension;
    const cp2x=p2.x-(p3.x-p1.x)*tension;
    const cp2y=p2.y-(p3.y-p1.y)*tension;
    ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,p2.x,p2.y);
  }
}

function drawSparkIron(canvasId, data, color){
  const canvas=document.getElementById(canvasId);
  if(!canvas)return;
  const dpr=window.devicePixelRatio||1;
  const W=canvas.offsetWidth||120, H=28;
  canvas.width=W*dpr; canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const max=Math.max(...data,1);
  const pts=data.map((v,i)=>({x:i/(data.length-1||1)*W, y:H-4-v/max*(H-8)}));
  // Area
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,color+'45'); grad.addColorStop(1,color+'00');
  ctx.beginPath(); splinePath(ctx,pts);
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath();
  ctx.fillStyle=grad; ctx.fill();
  // Line
  ctx.save(); ctx.shadowColor=color; ctx.shadowBlur=7;
  ctx.beginPath(); splinePath(ctx,pts);
  ctx.strokeStyle=color; ctx.lineWidth=1.3; ctx.lineCap='round'; ctx.stroke();
  ctx.restore();
  // Tip
  const last=pts[pts.length-1];
  ctx.save(); ctx.shadowColor=color; ctx.shadowBlur=10;
  ctx.beginPath(); ctx.arc(last.x,last.y,2.5,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill(); ctx.restore();
}
function drawConvChart(convData,dim){
  const canvas=document.getElementById('convChart');
  if(!canvas)return;
  // Resolve dimensions robustly — on mobile Safari getBCR can return 0 before layout settles
  const wrap=canvas.parentElement;
  const W=canvas.getBoundingClientRect().width||canvas.offsetWidth||wrap&&wrap.getBoundingClientRect().width||wrap&&wrap.offsetWidth||(window.innerWidth-32)||300;
  const H=canvas.getBoundingClientRect().height||canvas.offsetHeight||wrap&&wrap.getBoundingClientRect().height||wrap&&wrap.offsetHeight||200;
  if(W<10||H<10)return;
  // Force canvas element dimensions so getBCR works on subsequent frames
  if(!canvas.style.width||canvas.style.width==='100%'){canvas.style.width=W+'px';}
  if(!canvas.style.height||canvas.style.height==='100%'){canvas.style.height=H+'px';}
  // Reset particle cache if canvas size changed significantly (ex: rotation, resize mobile)
  if(drawConvChart._lastW&&(Math.abs(drawConvChart._lastW-W)>20||Math.abs(drawConvChart._lastH-H)>20)){
    drawConvChart._p=null;drawConvChart._r=null;drawConvChart._s=undefined;
  }
  drawConvChart._lastW=W;drawConvChart._lastH=H;
  const dpr=window.devicePixelRatio||1;
  canvas.width=Math.round(W*dpr);
  canvas.height=H*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);

  // Padding
  const pL=30,pR=52,pT=10,pB=4;
  const cW=W-pL-pR, cH=H-pT-pB;

  // Trouver maxV à partir des vraies données
  const allVals=convData.flatMap(d=>d.pts.filter(v=>v!==null&&v>0));
  const dataMax=allVals.length>0?Math.max(...allVals):30;
  const maxV=dataMax<=30?40:dataMax<=60?70:dataMax<=90?100:110;

  // === FOND IRON MAN ===
  // Grille
  const gs=22;
  ctx.strokeStyle='rgba(0,212,255,0.025)';ctx.lineWidth=0.4;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Particules
  if(!drawConvChart._p){
    drawConvChart._p=[];
    for(let i=0;i<12;i++)drawConvChart._p.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-0.5)*0.15,vy:-Math.random()*0.35-0.1,
      s:Math.random()*1.1+0.3,op:Math.random()*0.25+0.05,
      pulse:Math.random()*Math.PI*2
    });
  }
  drawConvChart._p.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.pulse+=0.05;
    if(p.y<-2)p.y=H+2;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    const op=p.op*(0.6+Math.sin(p.pulse)*0.4);
    ctx.save();ctx.shadowColor='#00d4ff';ctx.shadowBlur=4;
    ctx.beginPath();ctx.arc(p.x,p.y,p.s,0,Math.PI*2);
    ctx.fillStyle='#00d4ff';ctx.globalAlpha=op;ctx.fill();
    ctx.restore();
  });

  // Rain columns
  if(!drawConvChart._r){
    drawConvChart._r=[];
    for(let i=0;i<8;i++)drawConvChart._r.push({
      x:Math.random()*W,y:Math.random()*H,
      speed:0.4+Math.random()*0.6,len:15+Math.random()*25,op:0.03+Math.random()*0.04
    });
  }
  drawConvChart._r.forEach(c=>{
    c.y+=c.speed;if(c.y>H+c.len)c.y=-c.len;
    const y0=Math.max(0,c.y-c.len),y1=Math.min(H,c.y);
    if(y1>y0){
      const g=ctx.createLinearGradient(0,y0,0,y1);
      g.addColorStop(0,'rgba(0,212,255,0)');
      g.addColorStop(0.5,'rgba(0,212,255,'+c.op+')');
      g.addColorStop(1,'rgba(0,212,255,0)');
      ctx.fillStyle=g;ctx.fillRect(c.x-0.5,y0,1,y1-y0);
    }
  });

  // Scan line
  if(drawConvChart._s===undefined)drawConvChart._s=0;
  drawConvChart._s=(drawConvChart._s+0.5)%H;
  const sg=ctx.createLinearGradient(0,drawConvChart._s-10,0,drawConvChart._s+10);
  sg.addColorStop(0,'rgba(0,212,255,0)');
  sg.addColorStop(0.5,'rgba(0,212,255,0.07)');
  sg.addColorStop(1,'rgba(0,212,255,0)');
  ctx.fillStyle=sg;ctx.fillRect(0,drawConvChart._s-10,W,20);

  // === GRILLE DATA ===
  const gridSteps=maxV<=40?[0,10,20,30,40]:maxV<=70?[0,20,40,60]:maxV<=100?[0,25,50,75,100]:[0,25,50,75,100];
  gridSteps.forEach(v=>{
    const y=pT+cH-v/maxV*cH;
    ctx.beginPath();ctx.strokeStyle='rgba(0,170,255,0.08)';ctx.lineWidth=0.4;
    ctx.setLineDash([3,5]);ctx.moveTo(pL,y);ctx.lineTo(pL+cW,y);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(0,170,255,0.28)';ctx.font='7px monospace';ctx.textAlign='right';
    ctx.fillText(v+'%',pL-4,y+2.5);
  });

  // Today line
  const n=new Date();
  if(n.getFullYear()===cY&&n.getMonth()===cM&&dim>1){
    const todayD=Math.min(n.getDate(),dim);
    const tx=pL+(todayD-1)/(dim-1)*cW;
    ctx.strokeStyle='rgba(0,212,255,0.25)';ctx.lineWidth=0.7;ctx.setLineDash([2,4]);
    ctx.beginPath();ctx.moveTo(tx,pT);ctx.lineTo(tx,pT+cH);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(0,212,255,0.35)';ctx.font='7px monospace';ctx.textAlign='center';
    ctx.fillText('auj.',tx,pT+cH+9);
  }

  // === COURBES ===
  convData.forEach(({e,pts})=>{
    const vPts=pts.map((v,i)=>({
      x:pL+i/(dim-1||1)*cW,
      y:v!==null?pT+cH-Math.min(v,maxV)/maxV*cH:null,
      v
    })).filter(p=>p.y!==null);
    if(vPts.length<2)return;

    // Clip area to chart bounds
    ctx.save();
    ctx.beginPath();
    ctx.rect(pL,pT,cW,cH);
    ctx.clip();

    // Aire dégradée très légère
    const aG=ctx.createLinearGradient(0,pT,0,pT+cH);
    aG.addColorStop(0,e.hex+'15');
    aG.addColorStop(0.6,e.hex+'05');
    aG.addColorStop(1,e.hex+'00');
    ctx.beginPath();
    ctx.moveTo(vPts[0].x,vPts[0].y);
    for(let i=1;i<vPts.length;i++){
      const p0=vPts[Math.max(0,i-2)],p1=vPts[i-1],p2=vPts[i],p3=vPts[Math.min(vPts.length-1,i+1)];
      ctx.bezierCurveTo(p1.x+(p2.x-p0.x)*0.25,p1.y+(p2.y-p0.y)*0.25,p2.x-(p3.x-p1.x)*0.25,p2.y-(p3.y-p1.y)*0.25,p2.x,p2.y);
    }
    ctx.lineTo(vPts[vPts.length-1].x,pT+cH);
    ctx.lineTo(vPts[0].x,pT+cH);
    ctx.closePath();
    ctx.fillStyle=aG;ctx.fill();
    ctx.restore();

    // Ligne
    ctx.save();ctx.shadowColor=e.hex;ctx.shadowBlur=6;
    ctx.beginPath();
    ctx.moveTo(vPts[0].x,vPts[0].y);
    for(let i=1;i<vPts.length;i++){
      const p0=vPts[Math.max(0,i-2)],p1=vPts[i-1],p2=vPts[i],p3=vPts[Math.min(vPts.length-1,i+1)];
      ctx.bezierCurveTo(p1.x+(p2.x-p0.x)*0.25,p1.y+(p2.y-p0.y)*0.25,p2.x-(p3.x-p1.x)*0.25,p2.y-(p3.y-p1.y)*0.25,p2.x,p2.y);
    }
    ctx.strokeStyle=e.hex;ctx.lineWidth=1.5;ctx.lineCap='round';ctx.stroke();
    ctx.restore();

    // Dernier point + badge
    const last=vPts[vPts.length-1];
    ctx.save();ctx.shadowColor=e.hex;ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(last.x,last.y,4.5,0,Math.PI*2);ctx.strokeStyle=e.hex+'44';ctx.lineWidth=1;ctx.stroke();
    ctx.beginPath();ctx.arc(last.x,last.y,2,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    ctx.restore();
    if(last.v!==null){
      const lbl=last.v+'%';
      const tw=ctx.measureText(lbl).width+8;
      const bx=Math.min(last.x+5,W-tw-4),by=last.y-8;
      ctx.fillStyle=e.hex+'20';ctx.strokeStyle=e.hex+'55';ctx.lineWidth=0.5;
      ctx.beginPath();if(ctx.roundRect)ctx.roundRect(bx,by,tw,11,2);else ctx.rect(bx,by,tw,11);
      ctx.fill();ctx.stroke();
      ctx.fillStyle=e.hex;ctx.font='bold 7px monospace';ctx.textAlign='left';
      ctx.fillText(lbl,bx+4,by+8);
    }
  });
}

          +statRow('Call → Vente',pctCallVente,'#34d399')

    </div>

    <!-- DAILY TASKS -->

function animateScan(){
  const s=document.getElementById('scanLine');if(!s)return;
  const wrap=s.parentElement;if(!wrap)return;
  let pos=0;clearInterval(window._scanInt);
  window._scanInt=setInterval(()=>{pos+=1;if(pos>wrap.offsetHeight||0)pos=0;s.style.top=pos+'px';},16);
}

function toggleTask(id){
  const t=TASKS.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;
  applyTaskDoneUI();
  set(ref(db,'tasks_done/'+todayKey()+'/'+id),t.done).catch(()=>{});
}

async function renderLeads(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  const div=document.getElementById('page_leads');
  const leads=await loadLeads(cY,cM);
  const revenus=await loadRevenus(cY,cM);

  // Totals for ALL leads
  let sums={};ENTS.forEach(e=>{sums[e.key]={cash:0,comm:0,count:0};});
  Object.entries(leads).forEach(([id,l])=>{
    const e=ENTS.find(x=>x.key===l.entKey)||ENTS[0];

      <td><input class="lcash" type="number" value="${l.cashCollected||0}" onblur="upLead(${cY},${cM},'${id}','cashCollected',parseFloat(this.value)||0)">€</td>
      <td><input class="lcash" type="number" value="${l.cashReceived||0}" onblur="upLead(${cY},${cM},'${id}','cashReceived',parseFloat(this.value)||0)">€</td>
      <td><span class="lcomm">${comm.toFixed(0)}€</span></td>
      <td><div style="display:flex;flex-wrap:wrap;gap:2px;align-items:center">${tagsHtml}
        <select style="background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);border-radius:20px;padding:2px 6px;font-size:11px;outline:none;" onchange="if(this.value){addTag(${cY},${cM},'${id}',${JSON.stringify(l.tags||[])},this.value);this.value=''}">
          <option value="">+ tag</option>${PRESET_TAGS.map(t=>`<option value="${t}">${t}</option>`).join('')}
        </select>
      </div></td>
      <td><input class="linput" value="${l.note||''}" onblur="upLead(${cY},${cM},'${id}','note',this.value)" placeholder="Note..."></td>
      <td style="font-size:10px;color:var(--muted2)">${l.date||''}</td>
      <td><button class="ldel" onclick="delLead(${cY},${cM},'${id}')">✕</button></td>

  const sumCards=ENTS.map(e=>{

      <div class="lsum-comm" style="color:var(--muted2)">Généré : ${s.cash.toFixed(0)}€ · ${s.count} lead${s.count>1?'s':''}</div>
    </div>`;
  }).join('');

  // Filter buttons — dynamiques selon ENTS
  const filterBtns=[
    `<button onclick="window.setLeadsFilter('all')" style="background:${lf==='all'?'var(--cyan)':'transparent'};color:${lf==='all'?'#000':'var(--muted2)'};border:1px solid ${lf==='all'?'var(--cyan)':'var(--border2)'};border-radius:20px;padding:7px 16px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;transition:all 0.2s">Tous</button>`,
    ...ENTS.map(e=>{
      const active=lf===e.key;
      return `<button onclick="window.setLeadsFilter('${e.key}')" style="background:${active?e.hex:'transparent'};color:${active?'#000':e.hex};border:1px solid ${e.hex};border-radius:20px;padding:7px 16px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;transition:all 0.2s;${active?'box-shadow:0 0 8px '+e.hex+'44':''}">${e.name}</button>`;

      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">

            oninput="window.setLeadsSearch(this.value)"
            style="background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:7px 14px 7px 32px;color:var(--text);font-family:'Space Mono',monospace;font-size:11px;outline:none;width:200px;transition:border-color 0.2s"
            onfocus="this.style.borderColor='var(--cyan)'" onblur="this.style.borderColor='var(--border2)'">
        </div>
        ${filterBtns}
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${addBtns}</div>
    </div>
    <div style="font-size:11px;color:var(--muted2);margin-bottom:12px">
      <span style="color:var(--cyan)">${totCash.toFixed(0)}€ générés</span>
      <span style="margin:0 8px;opacity:0.3">·</span>
      <span style="color:var(--cyan)">${totComm.toFixed(0)}€ commission</span>
      <span style="margin:0 8px;opacity:0.3">·</span>
      <span>${filtered.length} lead${filtered.length>1?'s':''} affichés</span>
    </div>
    <div style="overflow-x:auto">
      <table class="leads-table">

      const ek=el.dataset.ek;
      if(!ek)return;
      if(el.classList.contains('rev-manual-input')) await window.saveRevenu(cY,cM,ek,'montant',parseFloat(el.value)||0);

    }, true);
  }
}

async function addLead(y,mo,ek){const lead={name:'Nouveau lead',entKey:ek,cashCollected:0,cashReceived:0,tags:[],note:'',date:new Date().toLocaleDateString('fr-BE')};try{await push(ref(db,`leads/${y}/${mo}`),lead);delete lCache[`${y}_${mo}`];renderLeads();}catch(e){}}
window.addLead=addLead;
async function upLead(y,mo,id,field,val){try{await set(ref(db,`leads/${y}/${mo}/${id}/${field}`),val);delete lCache[`${y}_${mo}`];}catch(e){}}
window.upLead=upLead;
async function addTag(y,mo,id,tags,tag){if(tags.includes(tag))return;await upLead(y,mo,id,'tags',[...tags,tag]);setTimeout(()=>renderLeads(),200);}
window.addTag=addTag;
async function removeTag(y,mo,id,tags,tag){await upLead(y,mo,id,'tags',tags.filter(t=>t!==tag));setTimeout(()=>renderLeads(),200);}
window.removeTag=removeTag;
async function delLead(y,mo,id){if(!confirm('Supprimer ce lead ?'))return;try{await remove(ref(db,`leads/${y}/${mo}/${id}`));delete lCache[`${y}_${mo}`];renderLeads();}catch(e){}}
window.delLead=delLead;

      <div class="acc-body${_paramsOpen.tasks?' open':''}">
        <div>${taskItems}</div>
        <div class="task-add-row" style="margin-top:10px">
          <input class="task-add-input" id="newTaskLbl" placeholder="Nouvelle tâche...">
          <input class="task-add-input" id="newTaskBadge" placeholder="Badge" style="max-width:110px">
          <button class="task-add-btn" onclick="addTask()">+ Ajouter</button>
        </div>
      </div>
    </div>

    <div style="margin-top:16px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;">
      <div style="font-size:10px;color:var(--muted2);letter-spacing:1px;margin-bottom:6px">⚠️ INFO</div>
      <div style="font-size:12px;color:var(--muted2);line-height:1.7">Modifier le nom ou la couleur ne supprime pas les données existantes.<br>Supprimer un entrepreneur est irréversible.</div>
    </div>
  </div>`;
}

// ===== PARAMS ACCORDION TOGGLES =====
window.toggleParamsEnt=function(key){_paramsOpen.ents[key]=!_paramsOpen.ents[key];renderParams();};
window.toggleParamsMetrics=function(key){_paramsOpen.metrics[key]=!_paramsOpen.metrics[key];renderParams();};
window.toggleParamsTasks=function(){_paramsOpen.tasks=!_paramsOpen.tasks;renderParams();};

// ===== METRIC MANAGEMENT =====
window.metricAdd=async function(ek){
  const lblEl=document.getElementById('newmet_lbl_'+ek);
  const keyEl=document.getElementById('newmet_key_'+ek);
  if(!lblEl||!keyEl)return;
  const lbl=lblEl.value.trim();
  let key=keyEl.value.trim().toLowerCase().replace(/[^a-z0-9]/g,'');
  if(!lbl){alert('Donne un nom à cette action.');return;}
  if(!key)key=lbl.toLowerCase().replace(/[^a-z0-9]/g,'').substring(0,12)||('m'+Date.now());
  const metrics=getMet(ek);
  if(metrics.find(m=>m.k===key)){alert('Cette clé existe déjà, choisis une autre clé.');return;}
  const newMetrics=[...metrics,{k:key,l:lbl}];
  METRICS[ek]=newMetrics;
  METRIC_ORDER[ek]=newMetrics.map(m=>m.k);
  try{
    await set(ref(db,'config/metrics/'+ek),newMetrics);
    await set(ref(db,'config/metricOrder/'+ek),METRIC_ORDER[ek]);
    lblEl.value='';keyEl.value='';
  }catch(e){alert('Erreur sauvegarde: '+e.message);}
  window.renderParams();
};

window.metricDel=async function(ek,mk){
  if(!confirm('Supprimer cette action ? Les données existantes sont conservées mais elle ne sera plus affichée.'))return;
  const metrics=getMet(ek).filter(m=>m.k!==mk);
  if(metrics.length===0){alert('Impossible de supprimer la dernière action.');return;}
  METRICS[ek]=metrics;
  METRIC_ORDER[ek]=metrics.map(m=>m.k);
  try{
    await set(ref(db,'config/metrics/'+ek),metrics);
    await set(ref(db,'config/metricOrder/'+ek),METRIC_ORDER[ek]);
  }catch(e){alert('Erreur: '+e.message);}
  window.renderParams();
};

window.metricRename=async function(ek,mk,newLabel){
  if(!newLabel.trim())return;
  const metrics=getMet(ek).map(m=>m.k===mk?{k:m.k,l:newLabel.trim()}:m);
  METRICS[ek]=metrics;
  try{await set(ref(db,'config/metrics/'+ek),metrics);}catch(e){}
};

window.metricMoveUp=async function(ek,idx){
  const order=getMetricsOrdered(ek).map(m=>m.k);
  if(idx===0)return;
  [order[idx-1],order[idx]]=[order[idx],order[idx-1]];
  await saveMetricOrder(ek,order);
  window.renderParams();
};
window.metricMoveDown=async function(ek,idx){
  const order=getMetricsOrdered(ek).map(m=>m.k);
  if(idx>=order.length-1)return;
  [order[idx],order[idx+1]]=[order[idx+1],order[idx]];
  await saveMetricOrder(ek,order);
  window.renderParams();
};

window.taskMove=async function(id,dir){
  const idx=TASKS.findIndex(t=>t.id===id);
  if(idx<0)return;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=TASKS.length)return;
  [TASKS[idx],TASKS[newIdx]]=[TASKS[newIdx],TASKS[idx]];
  await saveTasksConfig();
  window.renderParams();
};

async function saveEnt(key){
  const name=document.getElementById(`pn_${key}`)?.value||'';
  const rate=parseFloat(document.getElementById(`pr_${key}`)?.value)||5;
  const hex=document.getElementById(`pc_${key}`)?.value||'#00d4ff';
  try{await set(ref(db,`config/entrepreneurs/${key}`),{key,name,hex,rate});await loadEntrepreneurs();renderParams();}catch(e){}
}
window.saveEnt=saveEnt;
async function delEnt(key){
  if(!confirm(`Supprimer ${key} ?`))return;
  try{await remove(ref(db,`config/entrepreneurs/${key}`));await loadEntrepreneurs();renderParams();}catch(e){}
}
window.delEnt=delEnt;
async function addEnt(){
  const name=prompt('Nom du nouvel entrepreneur :');if(!name)return;
  const rate=parseFloat(prompt('Commission (%) :')||'5');
  const key=name.substring(0,2).toUpperCase()+Date.now().toString().slice(-3);
  const colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bff'];
  const hex=colors[Math.floor(Math.random()*colors.length)];
  try{await set(ref(db,`config/entrepreneurs/${key}`),{key,name,hex,rate});await loadEntrepreneurs();renderParams();}catch(e){}
}
window.addEnt=addEnt;

async function delTask(id){
  TASKS=TASKS.filter(t=>t.id!==id);
  await saveTasksConfig();
  renderParams();
}
window.delTask=delTask;

async function addTask(){
  const label=document.getElementById('newTaskLbl')?.value?.trim();
  const badge=document.getElementById('newTaskBadge')?.value?.trim()||'All';
  if(!label)return;
  const id='t'+Date.now();
  TASKS.push({id,label,color:'rgba(0,212,255,0.35)',badge,done:false});
  await saveTasksConfig();
  renderParams();
}
window.addTask=addTask;

// Init icon
setTabIconActive('dash',true);

// Start
async function loadMetrics(){
  try{
    const s=await get(ref(db,'config/metrics'));
    if(s.exists()){
      const data=s.val();
      Object.keys(data).forEach(ek=>{
        let arr=data[ek];
        // Firebase stores arrays as objects {0:{...},1:{...}} - convert back
        if(arr&&typeof arr==='object'&&!Array.isArray(arr)){
          arr=Object.values(arr);
        }
        if(Array.isArray(arr)&&arr.length>0){
          const valid=arr.filter(m=>m&&typeof m.k==='string'&&m.k&&typeof m.l==='string'&&m.l&&m.l!=='undefined');
          if(valid.length>0)METRICS[ek]=valid;
        }
      });
    }
  }catch(e){}
}
async function repairAndInit(){
  await loadEntrepreneurs();
  await loadMetricOrders();// Only load ordering preference
  await loadTasksConfig();
  await loadMonth(cY,cM);
  render();
}
</script>
